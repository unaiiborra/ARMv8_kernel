adapter driver jlink
adapter speed 4000
transport select jtag

set CHIPNAME imx8mp
set CHIPCORES 4
set DAP_TAPID 0x5ba00477

source [find target/imx8m.cfg]

imx8mp.a53.0 configure -rtos hwthread
imx8mp.a53.1 configure -rtos hwthread
imx8mp.a53.2 configure -rtos hwthread
imx8mp.a53.3 configure -rtos hwthread

init